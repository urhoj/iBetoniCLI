name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # @ibetoni/auth and @ibetoni/constants are private workspace packages (not
      # published to npmjs), declared as "*" so they resolve via npm-workspace
      # symlinks inside the betoni-online monorepo. A standalone checkout of this
      # repo can't fetch them, so check out the shared-packages repo and resolve
      # the two deps from it via file: (CI-only — the committed package.json keeps
      # "*"). Mirrors how puminet4/puminet5api consume the shared packages.
      # Requires a GH_PAT secret with read access to urhoj/ibetoni_packages.
      - uses: actions/checkout@v6
        with:
          repository: urhoj/ibetoni_packages
          path: ibetoni_packages
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v6
        with:
          # 22.x to match the rest of the monorepo (puminet5api) and because
          # vitest 4 / rolldown imports `styleText` from node:util (Node >= 20.12).
          node-version: "22.x"

      - name: Resolve private @ibetoni packages from the checkout (CI only)
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.dependencies['@ibetoni/auth']='file:./ibetoni_packages/auth';p.dependencies['@ibetoni/constants']='file:./ibetoni_packages/constants';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"

      - run: npm install
      - run: npm run type-check
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # On a green master push, tell puminet5api to move its vendored-CLI
  # submodule pointer (bump-vendored-cli.yml there). Gated on build-and-test
  # so a red master never propagates to the server-side CLI surface
  # (MCP ib_exec / /api/cli/exec). Requires GH_PAT with write access to
  # urhoj/puminet5api.
  notify-vendored-bump:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch vendored-cli-bump to urhoj/puminet5api
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/urhoj/puminet5api/dispatches \
            -d "{\"event_type\":\"vendored-cli-bump\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
